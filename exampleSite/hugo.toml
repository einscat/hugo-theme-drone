baseURL = 'https://notes.einscat.com/'
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn" # en / zh-cn / ... (This field determines which i18n file to use)
title = '活死人の行知路'

# 启用主题
theme = 'hugo-theme-drone'

[author]                                    # 必需
  name = "活死人"

[params]
  # site info (optional)                                  # 站点信息（可选，不需要的可以直接注释掉）
  logoTitle = "活死人"        # 默认值: 上面设置的title值
  keywords = ["Hugo", "theme","drone"]
  description = "遥望未来，一片混沌，行知路，虽千万里，吾往矣"


[params.meta]
  username = "Y"
  avatar = "/images/avatar.png"
  description = "活死人の行知路..."

