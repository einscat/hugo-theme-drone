{{ define "main" }}
<div class="relative w-full h-screen overflow-hidden bg-bg">

    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <div class="absolute left-1/2 top-1/2 z-10 w-0 h-0">

        {{ partial "cards/hi.html" . }}
        {{ partial "cards/clock.html" . }}
        {{ partial "cards/art.html" . }}
        {{ partial "cards/nav.html" . }}

    </div>
</div>

{{ $clockJs := resources.Get "js/clock.js" | js.Build (dict "Minify" true) | resources.Fingerprint }}
<script src="{{ $clockJs.RelPermalink }}" defer></script>
{{ end }}
