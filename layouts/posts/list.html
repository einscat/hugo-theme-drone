{{ define "main" }}
{{ partial "header.html" . }}

<div class="min-h-screen w-full pt-32 pb-20 px-4 sm:px-6 bg-bg">
    <div class="max-w-4xl mx-auto">

        <div class="text-center mb-16">
            <h1 class="font-averia text-5xl text-primary mb-4 relative inline-block">
                {{ .Title }}
                <span class="absolute -top-6 -right-8 text-4xl opacity-20 rotate-12">✨</span>
            </h1>
            {{ with .Params.description }}
            <p class="text-secondary text-lg max-w-2xl mx-auto leading-relaxed">{{ . }}</p>
            {{ end }}
        </div>

        <div class="p-8 text-center text-secondary/60 bg-white/40 rounded-3xl border border-dashed border-black/5">
            (接下来实现: Tabs 切换与列表)
        </div>

    </div>
</div>
{{ end }}
