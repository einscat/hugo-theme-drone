<a href="{{ .RelPermalink }}" class="group block">
  <article class="bg-white/60 hover:bg-white/90 border border-white/60 rounded-2xl p-4 flex items-center gap-5 transition-all duration-300 hover:shadow-lg backdrop-blur-sm hover:-translate-y-0.5">
    <div class="flex-shrink-0 w-14 h-14 bg-white rounded-xl border border-white shadow-sm flex flex-col items-center justify-center text-brand group-hover:scale-105 transition-transform">
      <span class="text-xl font-black font-averia leading-none">{{ .Date.Format "02" }}</span>
      <span class="text-[10px] font-bold uppercase text-secondary/60 mt-0.5">{{ .Date.Format "Jan" }}</span>
    </div>

    <div class="flex-1 min-w-0">
      <h3 class="text-lg font-bold text-primary truncate group-hover:text-brand transition-colors">{{ .Title }}</h3>
      <div class="flex items-center gap-2 text-xs text-secondary mt-1.5">
        <span>{{ .Date.Format "2006年 1月 2日" }}</span>
        <span class="w-1 h-1 rounded-full bg-secondary/30"></span>
        <span>{{ replace (.Date.Format "Mon") "Mon" "周一" | replaceRE "Tue" "周二" | replaceRE "Wed" "周三" | replaceRE "Thu" "周四" | replaceRE "Fri" "周五" | replaceRE "Sat" "周六" | replaceRE "Sun" "周日" }}</span>
      </div>
    </div>
  </article>
</a>
