<a href="{{ .RelPermalink }}" class="group block h-full">
  <article class="h-full bg-white/60 hover:bg-white border border-white/60 rounded-xl p-4 transition-all duration-200 hover:shadow-md hover:-translate-y-1 backdrop-blur-sm flex flex-col">

    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
         <span class="font-mono text-xs font-bold text-brand bg-brand/5 px-1.5 py-0.5 rounded">
          {{ .Date.Format "01-02" }}
        </span>
      </div>

      {{ with .Params.tags }}
      <div class="flex gap-1">
        {{ range first 1 . }}
        <span class="text-[10px] text-secondary bg-white/50 px-1.5 rounded border border-white/50">#{{ . }}</span>
        {{ end }}
        {{ if gt (len .) 1 }}<span class="text-[10px] text-secondary/50">+{{ sub (len .) 1 }}</span>{{ end }}
      </div>
      {{ end }}
    </div>

    <h3 class="text-sm font-bold text-primary group-hover:text-brand transition-colors line-clamp-2 leading-relaxed mb-auto">
      {{ .Title }}
    </h3>

  </article>
</a>
